name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: touch dist/.nojekyll
      - name: Encrypt index.html with staticrypt
        env:
          STATICRYPT_PASSWORD: ${{ secrets.SITE_PASSWORD }}
        run: |
          set -e
          if [ -z "$STATICRYPT_PASSWORD" ]; then
            echo "ERROR: SITE_PASSWORD secret is not set"
            exit 1
          fi
          npx staticrypt dist/index.html -d dist --remember 30 --short --salt e8fc710ba097a414d40f981b3d3d46f8
          if ! grep -q "staticrypt-html" dist/index.html; then
            echo "ERROR: staticrypt did not encrypt index.html"
            head -10 dist/index.html
            exit 1
          fi
          echo "✓ index.html encrypted successfully"
      - run: rm -f dist/.staticrypt.json

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
