- id: ai-agents
  title: "AI Agents & LLM"
  children:
    - id: llm-fundamentals
      title: "LLM Fundamentals"
      children:
        - id: prompt-engineering
          title: "Prompt Engineering: advanced techniques"
          summary: "Advanced prompt engineering (chain-of-thought, few-shot, role prompting, structured output) directly determines the quality of LLM outputs — it's the difference between a toy demo and a production system. For a backend developer building agents, this is as foundational as HTTP is to REST API design."
          resources:
            - "Anthropic: Prompt Engineering Guide — docs.anthropic.com/en/docs/build-with-claude/prompt-engineering"
            - "OpenAI: Prompt Engineering — platform.openai.com/docs/guides/prompt-engineering"
            - "DeepLearning.AI: ChatGPT Prompt Engineering for Developers (free) — deeplearning.ai/short-courses/chatgpt-prompt-engineering-for-developers"
            - "Anthropic Prompt Library: console.anthropic.com/library"
            - "Book: Prompt Engineering for Developers (various) — covers chain-of-thought, few-shot, structured output patterns in production"
          phase: phase-9-specialization
          phaseOrder: 300
        - id: embeddings
          title: "Embeddings: models, similarity, use cases"
          summary: "Embeddings are dense vector representations of text that capture semantic meaning — they power semantic search, RAG retrieval, recommendation, and clustering. Understanding cosine similarity, embedding dimensionality, and model choice (OpenAI ada-002 vs local alternatives) is required for building any RAG system."
          resources:
            - "OpenAI: Embeddings Guide — platform.openai.com/docs/guides/embeddings"
            - "Hugging Face: Sentence Transformers docs — sbert.net/docs"
            - "DeepLearning.AI: Building Systems with the ChatGPT API (free) — covers embeddings use cases"
            - "Pinecone: What are Embeddings? — pinecone.io/learn/vector-embeddings"
            - "Hugging Face Learn: AI Agents course (free) — huggingface.co/learn/agents-course — covers open-source LLM embeddings"
            - "Book: Natural Language Processing with Transformers (Tunstall, von Werra, Wolf) — O'Reilly — HuggingFace ecosystem deep dive"
          phase: phase-9-specialization
          phaseOrder: 310
        - id: rag-vs-finetuning
          title: "RAG vs Fine-tuning trade-offs"
          summary: "RAG retrieves relevant context at inference time (updatable, no training cost) while fine-tuning adjusts model weights for style or domain knowledge (static, expensive) — choosing wrong wastes significant time and money. Most production use cases are solved better by RAG, so understanding the decision criteria is a critical architect-level skill."
          resources:
            - "Anthropic: RAG vs Fine-tuning — docs.anthropic.com/en/docs/build-with-claude/rag"
            - "Blog: Patterns for Building LLM Apps (Chip Huyen) — huyenchip.com"
            - "DeepLearning.AI: Building and Evaluating Advanced RAG (free) — deeplearning.ai/short-courses/building-evaluating-advanced-rag"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — Chapter on training vs prompting strategies; definitive modern reference"
            - "Book: Designing Machine Learning Systems (Chip Huyen) — O'Reilly — ML systems design context for RAG vs fine-tuning decisions"
            - "Book: Building LLM Powered Applications (Valentina Alto) — Packt — LLM fundamentals and RAG patterns"
          phase: phase-9-specialization
          phaseOrder: 320
        - id: tokenization
          title: "Tokenization & context window management"
          summary: "Tokens are the unit of LLM billing and context limits — a misunderstanding of tokenization leads to truncated prompts, hallucinations, and unexpected costs. Managing context windows (what to include, summarization strategies, sliding windows) is critical for production agents that process long documents."
          resources:
            - "OpenAI Tokenizer playground: platform.openai.com/tokenizer"
            - "Anthropic: Model context window docs — docs.anthropic.com/en/docs/about-claude/models"
            - "Real Python: Tokenization with tiktoken — search realpython.com"
            - "Blog: LLM Token Counting and Cost Estimation — cookbook.openai.com"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — covers context window management strategies in production systems"
          phase: phase-9-specialization
          phaseOrder: 330

    - id: agent-architectures
      title: "Agent Architectures"
      children:
        - id: react-pattern
          title: "ReAct: Reason + Act loop"
          summary: "ReAct (Reasoning + Acting) is the foundational agent pattern where the LLM alternates between thinking through a problem and taking an action (tool call), repeating until a final answer is reached. It's the pattern behind most tool-using agents and is essential conceptual knowledge before studying any framework."
          resources:
            - "Original ReAct paper: arxiv.org/abs/2210.03629"
            - "LangChain: ReAct agent implementation — python.langchain.com/docs/modules/agents/agent_types/react"
            - "Anthropic: Tool use and ReAct patterns — docs.anthropic.com/en/docs/build-with-claude/tool-use"
            - "DeepLearning.AI: AI Agents in LangGraph (free) — deeplearning.ai/short-courses/ai-agents-in-langgraph (ReAct module)"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — structured deep dive on ReAct and agent loops"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — agent architecture chapter"
          phase: phase-9-specialization
          phaseOrder: 400
        - id: plan-execute
          title: "Plan-and-Execute pattern"
          summary: "Plan-and-Execute separates planning (generate a complete task plan) from execution (carry it out step by step), enabling better long-horizon task completion and easier debugging of where agents fail. It's the right architecture for complex multi-step tasks like automated code review or report generation."
          resources:
            - "LangGraph: Plan-and-Execute tutorial — github.com/langchain-ai/langgraph/blob/main/examples/plan-and-execute"
            - "Blog: Plan-and-Execute Agents (LangChain blog) — blog.langchain.dev"
            - "OpenAI Cookbook: Planning agents — github.com/openai/openai-cookbook"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — includes Plan-and-Execute pattern"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — agent architecture and task decomposition strategies"
          phase: phase-9-specialization
          phaseOrder: 410
        - id: multi-agent
          title: "Multi-agent orchestration"
          summary: "Multi-agent systems decompose complex tasks across specialized agents (planner, researcher, critic, executor) — they mirror microservices architecture and are the key to building agents that exceed single-model context limits. For a backend developer, this section connects directly to distributed systems thinking."
          resources:
            - "DeepLearning.AI: Multi AI Agent Systems with CrewAI (free) — deeplearning.ai/short-courses/multi-ai-agent-systems-with-crewai"
            - "LangGraph: Multi-agent architectures — langchain-ai.github.io/langgraph/concepts/multi_agent"
            - "CrewAI docs: docs.crewai.com"
            - "Anthropic: Building effective agents — anthropic.com/research/building-effective-agents"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — multi-agent module"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — multi-agent systems chapter"
          phase: phase-9-specialization
          phaseOrder: 420
        - id: human-in-loop
          title: "Human-in-the-loop checkpoints"
          summary: "Human-in-the-loop (HITL) patterns allow an agent to pause and request human approval or input before taking irreversible actions — this is critical for production safety in fintech contexts (e.g., before executing a payment or sending a customer-facing message). LangGraph's interrupt mechanism is the current standard implementation."
          resources:
            - "LangGraph: Human-in-the-loop guide — langchain-ai.github.io/langgraph/how-tos/human_in_the_loop"
            - "Anthropic: Human oversight patterns — docs.anthropic.com/en/docs/build-with-claude/overview"
            - "Blog: Designing safe AI agents — anthropic.com/research/building-effective-agents"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — HITL and interrupt module"
            - "Anthropic Cookbook: github.com/anthropics/anthropic-cookbook — human-in-the-loop patterns with Claude"
          phase: phase-9-specialization
          phaseOrder: 430
        - id: tool-calling
          title: "Tool use / function calling patterns"
          summary: "Tool calling (function calling) lets LLMs invoke external APIs, databases, or code execution — it's the mechanism that makes agents actually useful beyond text generation. Designing good tool schemas (clear names, typed parameters, descriptions) has an outsized impact on agent reliability."
          resources:
            - "Anthropic: Tool use documentation — docs.anthropic.com/en/docs/build-with-claude/tool-use"
            - "OpenAI: Function calling guide — platform.openai.com/docs/guides/function-calling"
            - "LangChain: Tools and toolkits — python.langchain.com/docs/modules/tools"
            - "DeepLearning.AI: Functions, Tools and Agents with LangChain (free) — deeplearning.ai/short-courses/functions-tools-agents-langchain"
            - "Anthropic Cookbook: Tool use examples — github.com/anthropics/anthropic-cookbook/tree/main/tool_use"
          phase: phase-9-specialization
          phaseOrder: 440

    - id: agent-frameworks
      title: "Agent Frameworks"
      children:
        - id: langgraph
          title: "LangGraph: stateful agent workflows"
          summary: "LangGraph models agent workflows as directed graphs with typed state — it solves the core production problems of stateful agents: checkpointing, branching, human-in-the-loop, and multi-agent coordination. It's currently the most production-ready Python agent framework and the one most tutorials are converging on."
          resources:
            - "LangGraph docs: langchain-ai.github.io/langgraph"
            - "DeepLearning.AI: AI Agents in LangGraph (free) — deeplearning.ai/short-courses/ai-agents-in-langgraph"
            - "LangGraph: Tutorials — github.com/langchain-ai/langgraph/tree/main/examples"
            - "LangChain blog: Why we built LangGraph — blog.langchain.dev"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — most structured LangGraph curriculum"
          phase: phase-9-specialization
          phaseOrder: 500
        - id: openai-agents-sdk
          title: "OpenAI Agents SDK"
          summary: "The OpenAI Agents SDK (formerly Swarm) provides a lightweight, opinionated framework for building multi-agent systems with OpenAI models — it uses handoffs between agents as the primary coordination primitive. It's simpler than LangGraph and good for OpenAI-centric stacks."
          resources:
            - "OpenAI Agents SDK docs: openai.github.io/openai-agents-python"
            - "OpenAI Cookbook: Agents examples — github.com/openai/openai-cookbook/tree/main/examples/agents"
            - "OpenAI blog: Introducing the Agents SDK — openai.com/blog"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — compares agent SDK approaches and handoff patterns"
          phase: phase-9-specialization
          phaseOrder: 510
        - id: claude-agent-sdk
          title: "Claude Agent SDK (Anthropic)"
          summary: "Anthropic's Claude Agent SDK enables building sophisticated agentic workflows on top of Claude models with built-in tool use, computer use, and multi-step task capabilities. As a user of Claude Code (this very tool), you have direct practical experience — studying the SDK formalizes that knowledge."
          resources:
            - "Anthropic: Build with Claude — docs.anthropic.com/en/docs/agents-and-tools"
            - "Anthropic Cookbook: github.com/anthropics/anthropic-cookbook — authoritative Claude API patterns"
            - "Anthropic: Computer use guide — docs.anthropic.com/en/docs/build-with-claude/computer-use"
            - "Claude Code source patterns — study how Claude Code itself is built"
            - "Anthropic Cookbook: MCP server examples — github.com/anthropics/anthropic-cookbook/tree/main/mcp"
          phase: phase-9-specialization
          phaseOrder: 520
        - id: spring-ai-agents
          title: "Spring AI: JVM-native agent building"
          summary: "Spring AI brings LLM integration into the Spring Boot ecosystem — chat clients, embedding models, vector stores, and tool calling all work with familiar Spring idioms like dependency injection and autoconfiguration. For a Java/Kotlin backend developer, this is the path of least resistance to production AI features in existing services."
          resources:
            - "Spring AI docs: docs.spring.io/spring-ai/reference — official JVM agent building reference"
            - "Spring AI samples: github.com/spring-projects/spring-ai-examples"
            - "Spring Academy: Spring AI course — spring.academy"
            - "InfoQ: Spring AI deep-dive articles — infoq.com"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — architecture principles applicable to Spring AI integration"
          phase: phase-9-specialization
          phaseOrder: 530
        - id: crewai
          title: "CrewAI: role-based multi-agent"
          summary: "CrewAI defines agents as team members with roles, goals, and backstories — it abstracts multi-agent coordination into a crew metaphor with sequential or parallel task execution. It's popular for automating business workflows and a good practical introduction to multi-agent thinking."
          resources:
            - "CrewAI docs: docs.crewai.com"
            - "DeepLearning.AI: Multi AI Agent Systems with CrewAI (free) — deeplearning.ai/short-courses/multi-ai-agent-systems-with-crewai"
            - "CrewAI GitHub: github.com/crewAIInc/crewAI (study examples/)"
            - "Book: Building LLM Powered Applications (Valentina Alto, Packt) — covers multi-agent workflow patterns"
          phase: phase-9-specialization
          phaseOrder: 540

    - id: mcp-protocol
      title: "MCP (Model Context Protocol)"
      children:
        - id: mcp-spec
          title: "MCP specification & architecture"
          summary: "MCP (Model Context Protocol) is Anthropic's open standard for connecting LLMs to external tools and data sources via a client-server protocol — it's becoming the USB-C of AI integrations, with broad adoption across IDEs, agents, and services. Understanding the spec (resources, tools, prompts primitives) is necessary to evaluate and architect MCP-based systems."
          resources:
            - "MCP specification: modelcontextprotocol.io/docs/concepts"
            - "MCP introduction: modelcontextprotocol.io/introduction"
            - "Anthropic blog: Introducing MCP — anthropic.com/news/model-context-protocol"
            - "MCP GitHub: github.com/modelcontextprotocol/specification"
            - "Anthropic Cookbook: MCP server patterns — github.com/anthropics/anthropic-cookbook/tree/main/mcp"
          phase: phase-9-specialization
          phaseOrder: 600
        - id: mcp-server-building
          title: "Building custom MCP servers"
          summary: "Building a custom MCP server means exposing your own data sources and tools to Claude and other MCP clients — it's the highest-leverage AI integration skill for a backend developer who wants to make internal company systems AI-accessible. The server can be written in Python (FastMCP) or TypeScript."
          resources:
            - "MCP: Building servers — modelcontextprotocol.io/docs/concepts/servers"
            - "FastMCP (Python SDK): github.com/jlowin/fastmcp"
            - "MCP TypeScript SDK: github.com/modelcontextprotocol/typescript-sdk"
            - "Anthropic Cookbook: MCP examples — github.com/anthropics/anthropic-cookbook/tree/main/mcp — authoritative MCP server patterns"
            - "Book: Building LLM Powered Applications (Valentina Alto, Packt) — LLM integration patterns relevant to MCP server design"
          phase: phase-9-specialization
          phaseOrder: 610
        - id: mcp-reference-servers
          title: "Study: modelcontextprotocol/servers repo"
          summary: "The official modelcontextprotocol/servers repository contains reference implementations for 20+ popular services (GitHub, Slack, PostgreSQL, filesystem, etc.) — studying their source code is the fastest way to learn MCP patterns, error handling, and best practices. It's also a practical resource pool of servers to use immediately."
          resources:
            - "MCP servers repo: github.com/modelcontextprotocol/servers"
            - "MCP server registry: glama.ai/mcp/servers (community servers list)"
            - "Awesome MCP servers: github.com/punkpeye/awesome-mcp-servers"
            - "Anthropic Cookbook: MCP examples — github.com/anthropics/anthropic-cookbook/tree/main/mcp"
          phase: phase-9-specialization
          phaseOrder: 620

    - id: rag-vectordb
      title: "RAG & Vector Databases"
      children:
        - id: pgvector-rag
          title: "pgvector: RAG with PostgreSQL"
          summary: "pgvector is a PostgreSQL extension that adds vector similarity search — it lets you build a complete RAG system on top of your existing PostgreSQL infrastructure without adding a separate vector database service. For a fintech backend team already running PostgreSQL, this is the pragmatic production choice."
          resources:
            - "pgvector GitHub: github.com/pgvector/pgvector"
            - "Supabase: Storing OpenAI embeddings in Postgres with pgvector — supabase.com/blog/openai-embeddings-postgres-vector"
            - "Spring AI: PgVector store docs — docs.spring.io/spring-ai/reference/api/vectordbs/pgvector.html"
            - "Timescale blog: pgvector performance guide — timescale.com/blog"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — vector store selection and RAG infrastructure chapter"
          phase: phase-9-specialization
          phaseOrder: 700
        - id: chroma-local
          title: "Chroma: local vector DB"
          summary: "Chroma is a lightweight, embeddable vector database that runs locally without any infrastructure setup — it's the easiest way to experiment with RAG pipelines before committing to a production vector store. Perfect for prototyping agent projects and portfolio demos."
          resources:
            - "Chroma docs: docs.trychroma.com"
            - "LangChain + Chroma integration — python.langchain.com/docs/integrations/vectorstores/chroma"
            - "DeepLearning.AI: LangChain Chat with Your Data (free) — deeplearning.ai/short-courses/langchain-chat-with-your-data — uses Chroma throughout"
            - "Book: Building LLM Powered Applications (Valentina Alto, Packt) — hands-on RAG with vector stores"
          phase: phase-9-specialization
          phaseOrder: 710
        - id: rag-pipeline
          title: "End-to-end RAG pipeline design"
          summary: "A production RAG pipeline involves document loading, chunking, embedding, storing, retrieval, reranking, and generation — each step has multiple design choices that compound into overall quality. Understanding the full pipeline is essential to debug retrieval failures and optimize answer quality."
          resources:
            - "LangChain: RAG from scratch series — youtube.com/playlist (LangChain YouTube)"
            - "DeepLearning.AI: Building and Evaluating Advanced RAG (free) — deeplearning.ai/short-courses/building-evaluating-advanced-rag"
            - "Anthropic: Contextual Retrieval blog post — anthropic.com/news/contextual-retrieval"
            - "LlamaIndex docs: RAG pipeline guide — docs.llamaindex.ai"
            - "Book: Building LLM Powered Applications (Valentina Alto, Packt) — end-to-end RAG pipeline chapter"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — RAG evaluation and production pipeline design"
          phase: phase-9-specialization
          phaseOrder: 720
        - id: chunking-strategies
          title: "Chunking & retrieval strategies"
          summary: "How you split documents before embedding (fixed-size, semantic, recursive, sentence-window) dramatically affects retrieval quality — bad chunking is the most common cause of RAG hallucinations. Advanced strategies like HyDE (hypothetical document embeddings) and reranking with cross-encoders significantly improve precision."
          resources:
            - "Pinecone: Chunking strategies — pinecone.io/learn/chunking-strategies"
            - "Blog: Advanced RAG Techniques (Akash Mathur) — medium.com"
            - "Anthropic: Contextual Retrieval — anthropic.com/news/contextual-retrieval"
            - "LlamaIndex: Node parsers and chunking — docs.llamaindex.ai/en/stable/module_guides/loading/node_parsers"
            - "Hugging Face Learn: AI Agents course (free) — huggingface.co/learn/agents-course — retrieval strategies module"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — chunking and retrieval quality optimization"
          phase: phase-9-specialization
          phaseOrder: 730

    - id: agent-evals
      title: "Agent Evaluation & Observability"
      children:
        - id: langsmith
          title: "LangSmith: agent tracing & evals"
          summary: "LangSmith provides tracing, debugging, and evaluation for LangChain/LangGraph agents — it captures every LLM call, tool invocation, and intermediate state, making agent debugging tractable. Without observability tooling, debugging a failing multi-step agent is like debugging distributed systems without logs."
          resources:
            - "LangSmith docs: docs.smith.langchain.com"
            - "LangChain: Evaluating RAG pipelines with LangSmith — docs.smith.langchain.com/tutorials/rag"
            - "LangChain YouTube: LangSmith tutorials — youtube.com/@LangChain"
            - "LangChain Academy: Introduction to LangGraph (free) — academy.langchain.com — includes LangSmith tracing module"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — agent evaluation and observability chapter"
          phase: phase-9-specialization
          phaseOrder: 800
        - id: agent-testing
          title: "Agent testing patterns"
          summary: "Testing agents requires a different approach than unit testing — LLM outputs are non-deterministic, so tests use semantic similarity checks, criteria-based graders, and human eval datasets rather than exact string matching. Building a test suite for your agents is what separates professional AI engineering from demo-ware."
          resources:
            - "DeepLearning.AI: Automated Testing for LLMOps (free) — deeplearning.ai/short-courses/automated-testing-llmops"
            - "Anthropic: Evals documentation — docs.anthropic.com/en/docs/build-with-claude/evals"
            - "OpenAI Evals framework: github.com/openai/evals"
            - "Blog: Testing LLM Applications (Hamel Husain) — hamel.dev"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — eval frameworks and production testing strategies"
          phase: phase-9-specialization
          phaseOrder: 810
        - id: guardrails
          title: "Safety & guardrails"
          summary: "Production AI agents need guardrails to prevent prompt injection, PII leakage, off-topic responses, and harmful outputs — especially critical in fintech where compliance and security are non-negotiable. Implementing input/output validation, content filtering, and rate limiting is a professional responsibility."
          resources:
            - "OWASP Top 10 for LLMs: owasp.org/www-project-top-10-for-large-language-model-applications"
            - "Guardrails AI: guardrailsai.com/docs"
            - "Anthropic: Safety and responsible AI — anthropic.com/safety"
            - "Microsoft: Responsible AI guidelines — learn.microsoft.com/en-us/azure/ai-services/responsible-use-of-ai-overview"
            - "Anthropic Cookbook: Safety patterns — github.com/anthropics/anthropic-cookbook"
            - "Book: AI Engineering (Chip Huyen, O'Reilly 2025) — safety, guardrails, and responsible AI production chapter"
          phase: phase-9-specialization
          phaseOrder: 820

    - id: ai-portfolio
      title: "GitHub Portfolio Projects"
      children:
        - id: project-mcp-server
          title: "Project: MCP server for Jira/Confluence"
          summary: "Building an MCP server for your company's Jira and Confluence is a high-value project that solves a real problem (making internal knowledge accessible to AI) while demonstrating MCP specification expertise and backend integration skills. It's immediately useful at work and impressive to recruiters who see real-world tool building."
          resources:
            - "MCP server tutorial: modelcontextprotocol.io/tutorials/building-mcp-with-tools"
            - "Atlassian REST API docs: developer.atlassian.com/cloud/jira/platform/rest/v3"
            - "Reference: github.com/modelcontextprotocol/servers/tree/main/src/github (study this first)"
            - "FastMCP (Python): github.com/jlowin/fastmcp (recommended framework)"
            - "Anthropic Cookbook: MCP server examples - github.com/anthropics/anthropic-cookbook/tree/main/mcp"
          phase: phase-9-specialization
          phaseOrder: 900
        - id: project-rag-codebase
          title: "Project: RAG over codebase (pgvector)"
          summary: "Building a RAG system that lets developers query a large codebase in natural language is a practical, portfolio-ready project that uses your existing PostgreSQL expertise alongside LLM skills. It demonstrates end-to-end AI engineering: embedding, vector search, retrieval, and generation."
          resources:
            - "pgvector + Spring AI quickstart — docs.spring.io/spring-ai/reference/api/vectordbs/pgvector.html"
            - "LangChain: Code understanding tutorial — python.langchain.com/docs/use_cases/code_understanding"
            - "Blog: Building a RAG system over code (various on medium.com/towards-ai)"
          phase: phase-9-specialization
          phaseOrder: 910
        - id: project-multi-agent-reviewer
          title: "Project: Multi-agent code reviewer"
          summary: "A multi-agent code reviewer (one agent for security, one for style, one for architecture) demonstrates practical multi-agent orchestration on a problem every developer cares about. It makes an excellent portfolio piece because it's immediately deployable as a GitHub Action."
          resources:
            - "LangGraph: Supervisor pattern — langchain-ai.github.io/langgraph/tutorials/multi_agent/agent_supervisor"
            - "CrewAI: Code review crew example — github.com/crewAIInc/crewAI-examples"
            - "GitHub Actions: Using AI in workflows — docs.github.com/en/actions"
          phase: phase-9-specialization
          phaseOrder: 920
        - id: project-spring-ai-api
          title: "Project: Spring AI agent REST API"
          summary: "Building a Spring Boot REST API that exposes an AI agent (with tool calling, vector search, and session memory) demonstrates that you can ship AI features using your primary tech stack — a key differentiator for a Java backend developer. This is the project that makes you hireable for AI-adjacent backend roles."
          resources:
            - "Spring AI docs: docs.spring.io/spring-ai/reference"
            - "Spring AI examples: github.com/spring-projects/spring-ai-examples"
            - "Spring Academy: Spring AI hands-on — spring.academy"
          phase: phase-9-specialization
          phaseOrder: 930

    - id: ai-practice
      title: "Hands-on Practice"
      children:
        - id: deeplearning-ai-agents
          title: "DeepLearning.AI: AI Agents in LangGraph (free)"
          summary: "This free short course by DeepLearning.AI and LangChain teaches building agents with LangGraph including ReAct, persistence, streaming, and multi-agent patterns — it's the best single starting point for practical agent development in Python. Expect 4-6 hours total."
          resources:
            - "Course link: deeplearning.ai/short-courses/ai-agents-in-langgraph"
            - "All DeepLearning.AI short courses: deeplearning.ai/short-courses (most are free)"
          phase: phase-9-specialization
          phaseOrder: 1000
          type: reference
        - id: deeplearning-crewai
          title: "DeepLearning.AI: Multi AI Agent Systems with CrewAI"
          summary: "This free course covers building multi-agent crews with CrewAI for automating complex business workflows — it introduces role-based agent design, hierarchical orchestration, and agent collaboration patterns. Complements the LangGraph course by showing a higher-level abstraction."
          resources:
            - "Course link: deeplearning.ai/short-courses/multi-ai-agent-systems-with-crewai"
            - "CrewAI docs: docs.crewai.com (for going deeper after the course)"
          phase: phase-9-specialization
          phaseOrder: 1010
          type: reference
        - id: anthropic-cookbook
          title: "Anthropic Cookbook: hands-on examples (GitHub)"
          summary: "The Anthropic Cookbook is the authoritative collection of practical Claude API examples — tool use, RAG, multi-turn conversation, computer use, and prompt caching all have working code notebooks. It's the first place to look when building with Claude APIs."
          resources:
            - "Anthropic Cookbook: github.com/anthropics/anthropic-cookbook"
            - "Anthropic docs: docs.anthropic.com/en/docs/build-with-claude"
          phase: phase-9-specialization
          phaseOrder: 1020
          type: reference
        - id: langchain-tutorials
          title: "LangChain/LangGraph: official tutorials"
          summary: "The official LangChain and LangGraph tutorials provide the most up-to-date patterns for building with these frameworks — the ecosystem evolves fast and official docs are often months ahead of blog posts and courses. Start with the LangGraph quickstart and then explore use-case tutorials."
          resources:
            - "LangGraph quickstart: langchain-ai.github.io/langgraph/tutorials/introduction"
            - "LangChain tutorials: python.langchain.com/docs/tutorials"
            - "LangChain YouTube: youtube.com/@LangChain"
          phase: phase-9-specialization
          phaseOrder: 1030
          type: reference
