    days:
      - { day: "mon", topicId: "completable-future", minutes: 45 }
      - { day: "tue", topicId: "virtual-threads-spring", minutes: 40 }
      - { day: "wed", topicId: "kotlin-coroutines", minutes: 45 }
      - { day: "thu", topicId: "kotlin-idioms", minutes: 40 }
