# 24-Week Study Plan — 40-60 min/day, 5 days/week
# Each day: 1 main topic (30-40 min) + 1 recurring practice (15-20 min)

config:
  dailyMinutes: 60
  studyDays: ["mon", "tue", "wed", "thu", "fri"]

recurring:
  mon: { topicId: "leetcode-practice", minutes: 20, label: "LeetCode (1 problem)" }
  tue: { topicId: "clozemaster-practice", minutes: 15, label: "English vocabulary" }
  wed: { topicId: "leetcode-practice", minutes: 20, label: "LeetCode (1 problem)" }
  thu: { topicId: "talkio-ai", minutes: 15, label: "Speaking (15 min)" }
  fri: { topicId: "leetcode-practice", minutes: 20, label: "LeetCode (1 problem)" }

phases:
  - id: phase-1
    title: "Java Core + Algorithms"
    weeks: [1, 2, 3, 4, 5, 6]
    color: "blue"
  - id: phase-2
    title: "Spring + Architecture"
    weeks: [7, 8, 9, 10, 11, 12]
    color: "purple"
  - id: phase-3
    title: "Data Infrastructure"
    weeks: [13, 14, 15, 16]
    color: "cyan"
  - id: phase-4
    title: "Event-Driven + DevOps"
    weeks: [17, 18, 19]
    color: "orange"
  - id: phase-5
    title: "Python + Data Analysis"
    weeks: [20, 21, 22]
    color: "yellow"
  - id: phase-6
    title: "AI Agents + Polish"
    weeks: [23, 24]
    color: "pink"

weeks:
  # ============ PHASE 1: Java Core + Algorithms (Weeks 1-6) ============
  - week: 1
    title: "Interview Fundamentals I"
    days:
      - { day: "mon", topicId: "collections-internals", minutes: 40 }
      - { day: "tue", topicId: "generics-deep", minutes: 40 }
      - { day: "wed", topicId: "exceptions-patterns", minutes: 40 }
      - { day: "thu", topicId: "string-internals", minutes: 40 }
      - { day: "fri", topicId: "equals-hashcode", minutes: 40 }

  - week: 2
    title: "Interview Fundamentals II + Modern Java"
    days:
      - { day: "mon", topicId: "io-nio", minutes: 40 }
      - { day: "tue", topicId: "virtual-threads", minutes: 40 }
      - { day: "wed", topicId: "pattern-matching", minutes: 40 }
      - { day: "thu", topicId: "records-sealed", minutes: 40 }
      - { day: "fri", topicId: "stream-gatherers", minutes: 40 }

  - week: 3
    title: "JVM Internals I"
    days:
      - { day: "mon", topicId: "jmm-happens-before", minutes: 45 }
      - { day: "tue", topicId: "heap-stack-metaspace", minutes: 40 }
      - { day: "wed", topicId: "gc-g1", minutes: 45 }
      - { day: "thu", topicId: "gc-zgc-shenandoah", minutes: 45 }
      - { day: "fri", topicId: "jfr-async-profiler", minutes: 40 }

  - week: 4
